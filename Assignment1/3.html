<!DOCTYPE html>
<html>

<head>
    <title>Text Formatting Example</title>
</head>

<body>
    <p><b>Bold</b></p>
    <p><i>Italic</i></p>
    <p><u>Underline</u></p>
    <p>X<sup>2</sup></p>
    <p>H<sub>2</sub>O</p>
    <p><strong>Strong</strong></p>
    <p><em>Emphasis</em></p>
    <p><mark>Highlight</mark></p>
    <p><small>Small text</small></p>
    <p><del>Deleted text</del></p>
    <p><ins>Inserted text</ins></p>
    <p><code>Code text</code></p>
</body>

</html>
